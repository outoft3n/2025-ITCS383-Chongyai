name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  mobile:
    name: Mobile - Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze
        continue-on-error: true

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore


  frontend:
    name: Frontend - Build, Test & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build
      - run: npm test -- --coverage --ci

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: implementations/frontend/coverage/lcov.info
          if-no-files-found: ignore


  backend:
    name: Backend - Build, Test & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/lcov.info
          if-no-files-found: ignore


  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [mobile, frontend, backend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: implementations/frontend/coverage
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=outoft3n_2025-ITCS383-Chongyai3
            -Dsonar.organization=outoft3n
            -Dsonar.projectVersion=${{ github.run_number }}

            -Dsonar.sources=implementations/backend/src,implementations/frontend/src,mobile/lib

            -Dsonar.tests=implementations/backend/src,implementations/frontend/src,mobile/test
            -Dsonar.test.inclusions=**/*.test.*,**/*.spec.*

            # JS coverage (frontend + backend)
            -Dsonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info,implementations/frontend/coverage/lcov.info

            # Dart coverage
            -Dsonar.dart.lcov.reportPaths=mobile/coverage/lcov.info

            # ignore junk
            -Dsonar.exclusions=**/node_modules/**,**/*.md,designs/**,images/**

            # ปิดภาษาไม่ใช้
            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
