name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # =========================
  # MOBILE
  # =========================
  mobile:
    name: Mobile - Analyze & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # Allow warnings without failing the pipeline
      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore


  # =========================
  # FRONTEND
  # =========================
  frontend:
    name: Frontend - Build, Test & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm test -- --coverage --ci

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: implementations/frontend/coverage/lcov.info
          if-no-files-found: ignore


  # =========================
  # BACKEND
  # =========================
  backend:
    name: Backend - Build, Test & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/lcov.info
          if-no-files-found: ignore


  # =========================
  # SONARCLOUD
  # =========================
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [mobile, frontend, backend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download coverage artifacts
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: implementations/frontend/coverage
        continue-on-error: true

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage
        continue-on-error: true

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=outoft3n_2025-ITCS383-Chongyai3
            -Dsonar.organization=outoft3n
            -Dsonar.projectVersion=${{ github.run_number }}

            -Dsonar.sources=implementations/backend/src,implementations/frontend/src,mobile/lib

            -Dsonar.tests=implementations/backend/src,implementations/frontend,mobile/test
            -Dsonar.test.inclusions=**/*.test.*,**/*.spec.*

            -Dsonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info,implementations/frontend/coverage/lcov.info
            -Dsonar.dart.lcov.reportPaths=mobile/coverage/lcov.info

            -Dsonar.coverage.exclusions=mobile/lib/screens/**,mobile/lib/widgets/**,implementations/frontend/src/app/**,implementations/frontend/src/components/**,**/*.tsx,**/*.jsx

            -Dsonar.exclusions=**/node_modules/**,**/*.md,designs/**,images/**

            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
