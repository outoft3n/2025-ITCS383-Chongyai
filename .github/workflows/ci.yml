name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  frontend:
    name: Frontend – Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: implementations/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --ci --passWithNoTests
        env:
          CI: true

  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/backend

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      JWT_SECRET: "ci-test-secret-not-used-in-production"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: implementations/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/lcov.info
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
