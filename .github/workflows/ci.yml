name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  mobile:
    name: Mobile - Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: implementations/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --ci --passWithNoTests
        env:
          CI: true

  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: implementations/backend

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      JWT_SECRET: "ci-test-secret"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: implementations/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/lcov.info
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [mobile, frontend, backend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=outoft3n_2025-ITCS383-Chongyai3
            -Dsonar.organization=outoft3n
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/*.test.*,mobile/test/**
            -Dsonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info
            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
