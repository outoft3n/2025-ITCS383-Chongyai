sonar.projectKey=outoft3n_2025-ITCS383-Chongyai3
sonar.organization=outoft3n

# This is the name and version displayed in the SonarCloud UI.
# sonar.projectName=Job Center Management System
# sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=implementations/frontend/src,implementations/backend/src

# Test sources
sonar.tests=implementations/backend/src/__tests__,implementations/frontend/src/__tests__

# Encoding of the source code. Default is default system encoding
# sonar.sourceEncoding=UTF-8

# Exclude test files and build artifacts from main source analysis
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/package-lock.json,implementations/backend/src/prisma/migrations/**/*.sql,implementations/backend/src/__tests__/**,implementations/frontend/src/__tests__/**,implementations/frontend/src/**/*.test.*,implementations/frontend/src/**/*.spec.*

# Exclude files from coverage calculation
sonar.coverage.exclusions=implementations/backend/src/index.ts,implementations/backend/src/prisma/seed.ts,implementations/frontend/src/app/layout.tsx,implementations/frontend/src/app/not-found.tsx,implementations/frontend/src/app/**/layout.tsx

# Coverage reports (lcov format generated by jest --coverage)
sonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info,implementations/frontend/coverage/lcov.info
