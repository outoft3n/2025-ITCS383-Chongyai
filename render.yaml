services:
  - type: web
    name: chongyai-backend
    runtime: node
    rootDir: implementations/backend
    buildCommand: npm ci && npx prisma generate --schema=src/prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=src/prisma/schema.prisma && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: chongyai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app   # update after deploying frontend

databases:
  - name: chongyai-db
    databaseName: jobcenter_db
    user: jobcenter
    plan: free
